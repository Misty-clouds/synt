name: synt

services:
  traefik:
    image: traefik:v3.3
    restart: unless-stopped
    command:
      - "--configFile=/etc/traefik/traefik.yml"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      # Read-only access to the Docker socket for label-based discovery.
      - "/var/run/docker.sock:/var/run/docker.sock:ro"
      - "./infra/traefik/traefik.yml:/etc/traefik/traefik.yml:ro"
      - "./infra/traefik/dynamic:/etc/traefik/dynamic:ro"
      # Persisted ACME certificate store.
      - "./infra/traefik/acme.json:/etc/traefik/acme.json"
    networks:
      - web

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: "https://api.adenijitaoheed.work"
    restart: unless-stopped
    expose:
      - "3000"
    environment:
      - "NODE_ENV=production"
    networks:
      - web
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=synt_web"
      - "traefik.http.routers.web.rule=Host(`synt.adenijitaoheed.work`)"
      - "traefik.http.routers.web.entrypoints=websecure"
      - "traefik.http.routers.web.tls=true"
      - "traefik.http.routers.web.tls.certresolver=letsencrypt"
      - "traefik.http.services.web.loadbalancer.server.port=3000"

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    expose:
      - "3001"
    environment:
      - "NODE_ENV=production"
      - "PORT=3001"
    networks:
      - web
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=synt_web"
      - "traefik.http.routers.api.rule=Host(`api.adenijitaoheed.work`)"
      - "traefik.http.routers.api.entrypoints=websecure"
      - "traefik.http.routers.api.tls=true"
      - "traefik.http.routers.api.tls.certresolver=letsencrypt"
      - "traefik.http.services.api.loadbalancer.server.port=3001"

networks:
  web:
    name: synt_web
